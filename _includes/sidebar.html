<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <h1>
        <a href="{{ site.baseurl }}">
          {{ site.title }}
        </a>
      </h1>
      <p class="sidebar-desc">{{ site.description_line1 }}</p>
      <p class="sidebar-desc">{{ site.description_line2 }}</p>
    </div>

    <hr class="sidebar-divider">
    <nav class="sidebar-nav">
      <a class="sidebar-nav-item{% if page.url == site.baseurl %} active{% endif %}" href="{{ site.baseurl }}">Home</a>

      <!-- {% comment %}
        The code below dynamically generates a sidebar nav of pages with
        `layout: page` in the front-matter. See readme for usage.
      {% endcomment %}

      {% assign pages_list = site.pages %}
      {% for node in pages_list %}
        {% if node.title != null %}
          {% if node.layout == "page" %}
            <a class="sidebar-nav-item{% if page.url == node.url %} active{% endif %}" href="{{ node.url }}">{{ node.title }}</a>
          {% endif %}
        {% endif %}
      {% endfor %} -->

      <a class="sidebar-nav-item" href="/blogs">Blogs</a>
      <a class="sidebar-nav-item" href="/papershelf">Papershelf</a>
      <a class="sidebar-nav-item" href="/resume">Resume</a>
      <a class="sidebar-nav-item" href="https://www.linkedin.com/in/kartikjagdale/details/certifications/" target="_blank">Certifications</a>
      <a class="sidebar-nav-item" href="https://github.com/kartikjagdale" target="_blank">GitHub</a>
    </nav>
  </div>
</div>
