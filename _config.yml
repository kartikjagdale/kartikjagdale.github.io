# Dependencies
markdown:         redcarpet
highlighter:      pygments

# Permalinks
permalink:        pretty


# Setup
title:            Kartik Jagdale
tagline:          'A Personal Technical/ Non-Technical Blog'
description: 'Senior Frontend Engineer (Angular, TypeScript, NgRx, Nx MonoRepo). Shipping AI-agentic workflows: Building with Claude Code, MCP servers, custom agent skills, hooks.'
description_line1: 'Senior Frontend Engineer (Angular, TypeScript, NgRx, Nx MonoRepo).'
description_line2: 'Shipping AI-agentic workflows: Building with Claude Code, MCP servers, custom agent skills, hooks.'
baseurl:          /

author:
  name:           'Kartik Jagdale'
  url:            https://twitter.com/kartikjagdale11


paginate:         5

# Custom vars
version:          1.0.0

defaults:
# Configs for SECTION : TechBlogs
  - scope:
      path: blogs/high-level-system-design
    values:
      subsection: high-level-system-design

  - scope:
      path: blogs/low-level-system-design
    values:
      subsection: low-level-system-design
  
  - scope:
      path: blogs/angular
    values:
      subsection: angular

  - scope:
      path: blogs
    values:
      section: blogs
      navlink: blogs
      comments: true
